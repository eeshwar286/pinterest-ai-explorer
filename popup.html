<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Pinterest AI Explorer</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Helvetica, Arial, sans-serif;
        width: 280px;
        margin: 0;
        padding: 16px;
        color: #111;
      }
      h1 {
        font-size: 15px;
        margin: 0 0 4px;
      }
      p {
        font-size: 12px;
        color: #666;
        margin: 0 0 12px;
      }
      label {
        font-size: 12px;
        font-weight: 600;
        display: block;
        margin-bottom: 6px;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        padding: 8px 10px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 13px;
      }
      button {
        margin-top: 10px;
        width: 100%;
        padding: 9px;
        background: #e60023;
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
      }
      button:hover {
        background: #c8001f;
      }
      .status {
        margin-top: 8px;
        font-size: 12px;
        color: #2a8a2a;
        min-height: 16px;
      }
    </style>
  </head>
  <body>
    <h1>Pinterest AI Explorer</h1>
    <p>Paste your Google Gemini API key (free at aistudio.google.com). Stored locally in your browser.</p>
    <label for="key">Gemini API Key</label>
    <input id="key" type="password" placeholder="AIza..." />
    <button id="save">Save</button>
    <div class="status" id="status"></div>
    <script src="popup.js"></script>
  </body>
</html>
